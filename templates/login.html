{% extends "layout.html" %}

{% block content %}
<section class="card card-small">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <img src="/static/images/COR AMANS.jpg" alt="COR AMANS Logo" class="h-20 w-auto">
    </div>

    <h2 class="text-center text-2xl font-bold mb-6">Login</h2>
    <p class="text-center text-gray-600 text-sm mb-6">
        Enter your email and password to access your account.
    </p>

    <form action="/login" method="POST" class="space-y-4">
        <input type="email" name="email" placeholder="Email Address" class="input">
        <input type="password" name="password" placeholder="Password" class="input">

        <div class="flex justify-between items-center text-sm text-gray-600">
            <label><input type="checkbox" name="remember" class="mr-1"> Remember me</label>
            <a href="#" class="text-green-600">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-red">Login</button>

        <p class="text-center text-gray-600 text-sm mt-4">
            Don't have an account? <a href="/register" class="text-green-600">Register here</a>
        </p>
    </form>

</section>
{% endblock %}
