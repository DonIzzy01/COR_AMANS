{% extends "layout.html" %}

{% block content %}
<section class="max-w-md mx-auto bg-white shadow-md rounded-xl p-8 mt-20">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <img src="/static/images/COR AMANS.jpg" alt="COR AMANS Logo" class="h-20 w-auto">
    </div>

    <h2 class="text-center font-bold text-2xl mb-6">Login</h2>
    <p class="text-center text-gray-600 mb-6 text-sm">
        Enter your email and password to access your account.
    </p>

    <form action="/login" method="POST" class="space-y-4">
        <input type="email" name="email" placeholder="Email Address" class="border p-2 rounded w-full">
        <input type="password" name="password" placeholder="Password" class="border p-2 rounded w-full">

        <div class="flex justify-between items-center text-sm text-gray-600">
            <div>
                <input type="checkbox" name="remember" class="mr-1"> Remember me
            </div>
            <a href="#" class="text-green-600 underline">Forgot password?</a>
        </div>

        <button type="submit" class="bg-red-600 text-white px-6 py-3 rounded w-full font-semibold hover:bg-red-700">
            Login
        </button>

        <p class="text-center text-gray-600 text-sm mt-4">
            Don't have an account? <a href="/register" class="text-green-600 underline">Register here</a>
        </p>
    </form>
</section>
{% endblock %}
